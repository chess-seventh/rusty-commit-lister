name: 🎯 Release
on:
  push:
    branches: [main]
env:
  CARGO_TERM_COLOR: always
jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      skipped: ${{ steps.changelog.outputs.skipped }}
      tag: ${{ steps.changelog.outputs.tag }}
      version: ${{ steps.changelog.outputs.version }}
      clean_changelog: ${{ steps.changelog.outputs.clean_changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 🛠️ Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: 🛠️ Install cargo-edit
        run: cargo install cargo-edit
      - name: 🎨 Conventional Changelog Action
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          git-user-name: "chess-seventh"
          git-user-email: "chess7th@pm.me"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          git-message: "ci: version bump"
          output-file: "CHANGELOG.md"
          release-count: "0"
          skip-version-file: "false"
          skip-commit: "false"
          skip-on-empty: "false"
          version-file: "Cargo.toml"
          version-path: "package.version"
          create-summary: "true"
      - name: 🛠️ Update Cargo.toml version
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: |
          cargo set-version ${{ steps.changelog.outputs.version }}
          cargo build --verbose
          cargo update
          git config user.name "chess-seventh"
          git config user.email "chess7th@pm.me"
          git add Cargo.lock
          git commit -m "chore: update Cargo.lock [skip ci]"
          git push
  build-artifacts:
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.skipped == 'false' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
      - name: 🛠️ Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: 🛠️ Install cargo-dist
        run: cargo install cargo-dist --version 0.8.0
        shell: bash
      - name: 🏗️ Build release artifacts
        run: cargo dist build --target ${{ matrix.target }}
        shell: bash
      - name: 📦 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: target/dist/
  create-release:
    needs: [prepare-release, build-artifacts]
    if: ${{ needs.prepare-release.outputs.skipped == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          merge-multiple: true
          path: dist/
      - name: ✨ Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.prepare-release.outputs.tag }}
          name: ${{ needs.prepare-release.outputs.tag }}
          body: ${{ needs.prepare-release.outputs.clean_changelog }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "dist/**/*"
