name: 🎯 Release
on:
  workflow_run:
    workflows: ["🔍 CI - Quality & Coverage"]
    types: [completed]
    branches: ["main"]
permissions:
  contents: write
  pull-requests: write
env:
  CARGO_TERM_COLOR: always
jobs:
  release:
    name: 🎯 Create Release
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      !contains(github.event.workflow_run.head_commit.message, 'chore(release)')
    steps:
      - name: 🔑 Generate GitHub App Token
        id: generate_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}
      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: 📦 Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: 🔍 Debug - Current State
        run: |
          echo "=== Current Version ==="
          grep '^version' Cargo.toml | head -1
          echo ""
          echo "=== Latest Tags ==="
          git tag --sort=-v:refname | head -5
          echo ""
          echo "=== Recent Commits ==="
          git log --oneline -10
      - name: 🎨 Generate Changelog & Bump Version
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ steps.generate_token.outputs.token }}
          git-message: "chore(release): {version}"
          git-user-name: "chess-seventh"
          git-user-email: "chess7th@pm.me"
          preset: "conventionalcommits"
          output-file: "CHANGELOG.md"
          release-count: 0
          skip-on-empty: false
          skip-git-pull: false
          skip-commit: false
          skip-tag: false
          version-file: "Cargo.toml"
          version-path: "package.version"
          tag-prefix: "v"
      - name: 🔍 Debug - Changelog Outputs
        run: |
          echo "=== Changelog Action Outputs ==="
          echo "Skipped: ${{ steps.changelog.outputs.skipped }}"
          echo "Version: ${{ steps.changelog.outputs.version }}"
          echo "Tag: ${{ steps.changelog.outputs.tag }}"
          echo ""
          echo "=== Cargo.toml After Bump ==="
          grep '^version' Cargo.toml | head -1
      - name: ❌ Fail if Version is Invalid
        if: steps.changelog.outputs.skipped == 'false'
        run: |
          VERSION="${{ steps.changelog.outputs.version }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Version bump failed! Got: '$VERSION'"
            exit 1
          fi
          echo "✅ Valid version: $VERSION"
      - name: ❄️ Update flake.nix version
        if: steps.changelog.outputs.skipped == 'false'
        run: |
          VERSION="${{ steps.changelog.outputs.version }}"
          echo "Updating flake.nix to version: $VERSION"
          sed -i "s/version = \"[0-9]\+\.[0-9]\+\.[0-9]\+\"/version = \"${VERSION}\"/" flake.nix
          grep 'version = ' flake.nix | head -1
      - name: 🔒 Update Cargo.lock
        if: steps.changelog.outputs.skipped == 'false'
        run: |
          cargo update -p rusty-commit-lister
          cargo check
      - name: 💾 Commit Version File Updates
        if: steps.changelog.outputs.skipped == 'false'
        run: |
          git config user.name "chess-seventh"
          git config user.email "chess7th@pm.me"

          git add flake.nix Cargo.lock

          if git diff --staged --quiet; then
            echo "No additional changes to commit"
          else
            git commit -m "chore(release): update flake.nix and Cargo.lock for ${{ steps.changelog.outputs.version }} [skip ci]"
            git push origin main
          fi
      - name: ✨ Create GitHub Release
        if: steps.changelog.outputs.skipped == 'false'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.changelog.outputs.tag }}
          name: "Release ${{ steps.changelog.outputs.tag }}"
          body: ${{ steps.changelog.outputs.clean_changelog }}
          token: ${{ steps.generate_token.outputs.token }}
          draft: false
          prerelease: false
      - name: 📊 Release Summary
        if: steps.changelog.outputs.skipped == 'false'
        run: |
          echo "## 🎉 Release Created!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.changelog.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.changelog.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Changelog" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.changelog.outputs.clean_changelog }}" >> $GITHUB_STEP_SUMMARY
      - name: ⏭️ Release Skipped
        if: steps.changelog.outputs.skipped == 'true'
        run: |
          echo "## ⏭️ Release Skipped" >> $GITHUB_STEP_SUMMARY
          echo "No releasable commits found since last tag." >> $GITHUB_STEP_SUMMARY
