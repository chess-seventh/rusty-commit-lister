schema_version: 1
# Journey: Daily Commit Review
# Status: validated — DISCUSS wave 2026-05-18
# Owner: franci (sole user)
# Tool: rusty-commit-lister
# Predecessor: seed generated by DISCOVER wave 2026-05-18

journey:
  id: daily-commit-review
  name: "Daily Commit Review"
  version: "0.2.0"
  status: validated
  job_id: job-orient
  description: >
    Franci opens rusty-commit-lister in the terminal at the start or end of a working session to orient themselves — what was committed today and over the past several days, across all active repositories — without leaving the terminal or switching to Obsidian.

  actor:
    id: franci
    type: sole-user
    characteristics:
      - Terminal-first, keyboard-driven workflow
      - Obsidian Diary at ~/Documents/Wiki/📅 Diaries/0. Journal/YYYY/MM-MMM/YYYY-MM-DD.md
      - rusty-commit-saver (git post-commit hook) writes commits as Markdown table rows
      - Works across multiple personal repositories simultaneously
      - Vim keybindings as muscle memory (j/k navigation)
  trigger:
    description: "Start or end of a working session; desire to recall or summarise recent commits"
    frequency: daily
    context: terminal session already open
  desired_outcome: >
    Scan all commits from the past N days across all repos in under 10 seconds, without leaving the terminal or opening Obsidian.

  emotional_arc:
    start: "Slightly disoriented — I need to recall what I worked on but context is scattered"
    middle: "Focused and scanning — the list is right there, I'm in control, navigation is fluid"
    end: "Grounded and ready — I know exactly what I committed; I can resume or close out"
    pattern: confidence-building
    notes: >
      Peak tension is at load time: will all commits appear? The row count confirmation ('37 commits across 5 repos') is the moment anxiety resolves. After that, browsing should feel effortless — like reading a summary someone else prepared for me.

steps:
  - id: launch
    name: "Launch tool"
    action: "Run `rusty-commit-lister` in terminal"
    entry_point: true
    tui_mockup: |
      $ rusty-commit-lister
      Loading commits for the last 7 days...  [spinner]

      (appears within 100ms; spinner visible while scan runs)
    shared_artifacts:
      - name: scan_days_back
        source: "~/.config/rusty-commit-lister/config.toml"
        displayed_as: "${scan_days_back}"
        consumers: ["launch status line", "load step", "status bar"]
    emotional_state:
      entry: "Slightly disoriented — need to see what I worked on"
      exit: "Mildly anticipatory — tool is starting up"
    integration_checkpoint: |
      Binary on PATH. Config file at ~/.config/rusty-commit-lister/config.toml
      readable with valid scan_days_back value. Exit code 0 on success; 1 with
      helpful message if config absent (offer to create with defaults).
    failure_modes:
      - "Binary not on PATH — error: command not found"
      - "Config file missing — tool must offer helpful default or creation prompt"
      - "Invalid config value (scan_days_back = 0 or negative) — validation error with suggestion"
    success_criteria: "Tool outputs first line within 100ms; full TUI renders in < 2 seconds for scan_days_back <= 30"
    gherkin: |
      Scenario: Tool starts within responsiveness threshold
        Given franci's terminal has rusty-commit-lister on PATH
        And ~/.config/rusty-commit-lister/config.toml exists with scan_days_back = 7
        When franci runs `rusty-commit-lister`
        Then a loading indicator appears within 100ms
        And the TUI table renders within 2 seconds

      Scenario: Missing config falls back to sensible default
        Given rusty-commit-lister is installed
        And no config file exists at ~/.config/rusty-commit-lister/config.toml
        When franci runs `rusty-commit-lister`
        Then the tool starts with scan_days_back = 7 as default
        And franci sees a one-line notice: "Using defaults — no config found at ~/.config/rusty-commit-lister/config.toml"
  - id: load
    name: "Load commit data"
    action: "Tool scans Obsidian daily notes for the configured scan window"
    trigger: on_launch
    tui_mockup: |
      ╔═══════════════════════════════════════════════════════════╗
      ║ rusty-commit-lister  •  last 7 days  •  37 commits         ║
      ╠═══╦══════════════╦════════════════════╦════════════════════╣
      ║ # ║ DATE / TIME  ║ REPO               ║ MESSAGE            ║
      ╠═══╬══════════════╬════════════════════╬════════════════════╣
      ║ 1 ║ 05-18 14:32  ║ rusty-commit-lister║ feat: add TUI skel ║
      ║ 2 ║ 05-18 11:15  ║ obsidian-utils     ║ fix: emoji path    ║
      ║ 3 ║ 05-17 22:40  ║ dotfiles           ║ chore: update nvim ║
      ...
      ╚═══╩══════════════╩════════════════════╩════════════════════╝
      [j/k] navigate  [/] search  [Enter] detail  [r] refresh  [q] quit
    shared_artifacts:
      - name: vault_path
        source: "~/.config/rusty-commit-lister/config.toml"
        displayed_as: "${vault_path}"
        consumers: ["load step", "error messages", "status bar"]
      - name: commit_rows
        source: "Obsidian daily notes parsed by markdown-table-parser module"
        displayed_as: "${commit_count} commits across ${repo_count} repos"
        consumers: ["status bar", "browse step", "search step", "detail step"]
      - name: note_date_format
        source: "rusty-commit-saver format contract: YYYY-MM-DD.md filename"
        displayed_as: "date column YYYY-MM-DD HH:MM"
        consumers: ["browse step", "detail step", "date range filter (future)"]
    emotional_state:
      entry: "Mildly anticipatory — did the scan find everything?"
      exit: "Grounded — row count confirms how much activity there was"
    integration_checkpoint: |
      Vault path resolves including Unicode emoji segment. At least one daily note
      file found for the scan window. Parser produces ≥ 0 rows without panicking on
      malformed rows (skip-and-log strategy). Status bar shows commit count.
    failure_modes:
      - "Unicode emoji path (📅 Diaries) causes OsString failure — crash or silent zero rows"
      - "Note format changed by rusty-commit-saver update — column mismatch, parser must skip unknown columns gracefully"
      - "No notes found for date range — empty state shows 'No commits found for the last N days' with vault path confirmation"
      - "Daily note exists but has no Commits table — skip silently, do not count as error"
    success_criteria: >
      All daily notes in scan window parsed; status bar shows commit count and repo count; empty state explains cause if zero rows.

    gherkin: |
      Scenario: All commits in scan window appear in the table
        Given franci's Obsidian vault contains daily notes for 2026-05-12 through 2026-05-18
        And each note contains a "## Commits" Markdown table
        And config scan_days_back = 7
        When rusty-commit-lister loads
        Then the status bar shows the total commit count across all seven notes
        And all repos represented in those notes appear as distinct values in the REPO column

      Scenario: Unicode vault path is handled correctly
        Given the vault path contains "📅 Diaries" in the directory name
        When rusty-commit-lister scans for daily notes
        Then all notes at that path are found and parsed without error
        And no commits are silently missing due to path encoding

      Scenario: Empty scan window shows informative state
        Given franci sets scan_days_back = 3
        And no daily notes exist for the last 3 days
        When rusty-commit-lister loads
        Then the TUI shows: "No commits found for the last 3 days"
        And franci sees the vault path that was searched, so they can verify the config
  - id: browse
    name: "Browse commit list"
    action: "Franci navigates the table with j/k/PgUp/PgDn"
    tui_mockup: |
      ╔═══════════════════════════════════════════════════════════════╗
      ║ rusty-commit-lister  •  last 7 days  •  37 commits            ║
      ╠═══╦══════════════╦══════════════════════╦═════════════════════╣
      ║ # ║ DATE / TIME  ║ REPO                 ║ MESSAGE             ║
      ╠═══╬══════════════╬══════════════════════╬═════════════════════╣
      ║ 1 ║ 05-18 14:32  ║ rusty-commit-lister  ║ feat: add TUI skel… ║
      ║▶2 ║ 05-18 11:15  ║ obsidian-utils       ║ fix: emoji path…    ║  <- selected (highlight)
      ║ 3 ║ 05-17 22:40  ║ dotfiles             ║ chore: update nvim… ║
      ║ 4 ║ 05-17 19:03  ║ rusty-commit-saver   ║ refactor: hook cle… ║
      ║ 5 ║ 05-16 09:55  ║ dotfiles             ║ feat: starship pro… ║
      ╚═══╩══════════════╩══════════════════════╩═════════════════════╝
      [j/k] navigate  [/] search  [Enter] detail  [r] refresh  [q] quit
      Row 2/37  •  05-18 11:15  •  obsidian-utils
    shared_artifacts:
      - name: selected_row
        source: "TUI cursor state (in-memory)"
        displayed_as: "▶ row indicator + status bar coordinates"
        consumers: ["inspect step", "act step", "status bar"]
    emotional_state:
      entry: "Focused — list is visible, scanning for what I need"
      exit: "Satisfied — found the commit or ready to search"
    integration_checkpoint: |
      j/k move selection one row at a time. PgUp/PgDn move viewport by page.
      Long messages truncated with ellipsis (…). Row indicator (▶) clearly visible.
      Status bar shows row position (Row N/Total). Scroll wraps at top/bottom (no crash).
    failure_modes:
      - "Long commit messages truncated with no indicator — user thinks message is complete"
      - "Many rows same timestamp — order ambiguous; secondary sort by row-in-file needed"
      - "Terminal too narrow — columns collapse ungracefully; minimum 80 columns required"
    success_criteria: >
      Navigation is responsive (no perceptible lag). Selected row is visually distinct (▶ + highlight). Truncated messages show ellipsis. Status bar updates on every row change.

    gherkin: |
      Scenario: Keyboard navigation moves selection through the list
        Given the commit table has 37 rows loaded
        And franci's cursor is on row 1
        When franci presses j three times
        Then the cursor is on row 4
        And the status bar shows "Row 4/37"

      Scenario: Long commit message is truncated with ellipsis
        Given a commit message exceeds the available column width
        When that row is visible in the table
        Then the message column shows the first N characters followed by "…"
        And no text overflows into adjacent columns

      Scenario: Page navigation jumps by viewport size
        Given the commit table has 37 rows and the viewport shows 10 rows
        When franci presses PgDn
        Then rows 11-20 are visible and row 11 is selected
  - id: filter-or-search
    name: "Narrow results (optional)"
    action: "Franci types / to activate search, types query, Esc to clear"
    optional: true
    depends_on: browse
    job_id: job-find-commit
    tui_mockup: |
      ╔═══════════════════════════════════════════════════════════════╗
      ║ rusty-commit-lister  •  last 7 days  •  4 of 37 commits       ║
      ╠═══╦══════════════╦══════════════════════╦═════════════════════╣
      ║ # ║ DATE / TIME  ║ REPO                 ║ MESSAGE             ║
      ╠═══╬══════════════╬══════════════════════╬═════════════════════╣
      ║▶1 ║ 05-18 14:32  ║ rusty-commit-lister  ║ feat: add TUI skel… ║
      ║ 2 ║ 05-15 20:11  ║ rusty-commit-lister  ║ chore: add deps     ║
      ║ 3 ║ 05-14 16:44  ║ rusty-commit-lister  ║ fix: parser panic   ║
      ║ 4 ║ 05-12 10:02  ║ rusty-commit-lister  ║ feat: initial scaff ║
      ╚═══╩══════════════╩══════════════════════╩═════════════════════╝
      / rusty-commit-lister█                     [Esc] clear  [Enter] confirm
    shared_artifacts:
      - name: search_query
        source: "TUI input state (in-memory)"
        displayed_as: "/ ${search_query} in search bar"
        consumers: ["filter-or-search step", "status bar match count"]
    emotional_state:
      entry: "Mildly frustrated — too many rows, need to narrow"
      exit: "Relieved — subset visible, found what I needed"
    integration_checkpoint: |
      / activates search bar. Typing filters message AND repo columns simultaneously.
      Status bar updates match count in real time. Esc clears query and returns to full list.
      Case-insensitive matching. Empty query shows full list.
    failure_modes:
      - "Search only matches exact case — user types lowercase but commit message is mixed"
      - "Esc in search mode exits tool instead of clearing search"
      - "Search matches repo column but user expects message-only search"
    success_criteria: >
      Results narrow in real time as franci types. Match count visible in status bar. Esc clears query and restores full list. Case-insensitive. Searches both message and repo.

    gherkin: |
      Scenario: Real-time search narrows the commit list
        Given 37 commits are loaded
        And franci presses /
        When franci types "rusty"
        Then the table shows only commits where the REPO or MESSAGE contains "rusty"
        And the status bar shows "N of 37 commits"

      Scenario: Search is case-insensitive
        Given commits include "Fix: Emoji Path" (mixed case)
        When franci types "emoji" in the search bar
        Then that commit appears in the filtered results

      Scenario: Clearing search restores full list
        Given franci has typed "dotfiles" in the search bar
        When franci presses Esc
        Then all 37 commits are visible again
        And the search bar is cleared
  - id: inspect
    name: "View commit detail"
    action: "Franci presses Enter on a selected row"
    optional: true
    depends_on: browse
    job_id: job-inspect-commit
    tui_mockup: |
      ╔═══════════════════════════════════════════════════════════════╗
      ║ Commit Detail                                    [Esc] back   ║
      ╠═══════════════════════════════════════════════════════════════╣
      ║                                                               ║
      ║  Date / Time   2026-05-18  11:15                              ║
      ║  Repository    obsidian-utils                                 ║
      ║  Message       fix: handle emoji path in vault root           ║
      ║                                                               ║
      ║  Full path     ~/Documents/projects/obsidian-utils            ║
      ║  URL           https://github.com/franci/obsidian-utils       ║
      ║                                                               ║
      ║  [c] copy URL to clipboard    [o] open URL in browser         ║
      ╚═══════════════════════════════════════════════════════════════╝
    shared_artifacts:
      - name: commit_url
        source: "REPOSITORY URL column from parsed Markdown table row"
        displayed_as: "URL field in detail panel"
        consumers: ["inspect step (display)", "act step (clipboard/browser)"]
      - name: commit_folder_path
        source: "FOLDER column from parsed Markdown table row"
        displayed_as: "Full path field in detail panel"
        consumers: ["inspect step (display)"]
    emotional_state:
      entry: "Curious — want to see full context of this commit"
      exit: "Satisfied — full path and URL visible; can act on it"
    integration_checkpoint: |
      Enter opens detail panel overlay. Full (un-truncated) message, folder path, and URL shown.
      Esc closes panel and returns to same row position in the list. URL present for all rows
      where the rusty-commit-saver wrote a REPOSITORY URL value.
    failure_modes:
      - "URL column empty for some commits (older notes with different saver version) — show placeholder, not crash"
      - "Folder path contains spaces or special characters — must render without truncation"
      - "Detail panel overlaps status bar — layout must reserve space"
    success_criteria: >
      Detail panel shows full un-truncated message, full folder path, full URL, repo name, date/time. Esc returns to exact row position. URL copyable. Panel does not corrupt underlying table state.

    gherkin: |
      Scenario: Commit detail shows full untruncated content
        Given a commit row with a 120-character message is selected
        When franci presses Enter
        Then the detail panel shows the complete message without truncation
        And the full folder path and repository URL are visible

      Scenario: Closing detail returns to same position
        Given franci has navigated to row 14 in a list of 37 commits
        And the detail panel is open for row 14
        When franci presses Esc
        Then the table is visible again with row 14 selected
        And the scroll position is unchanged

      Scenario: Missing URL does not crash the detail view
        Given a commit row from an older note format has no REPOSITORY URL value
        When franci opens the detail panel for that row
        Then the URL field shows "— not available —"
        And no error or crash occurs
  - id: act
    name: "Act on a commit"
    action: "Press c to copy URL, o to open in browser, or Esc to return"
    optional: true
    depends_on: inspect
    job_id: job-inspect-commit
    tui_mockup: |
      (same detail panel as inspect)
      After [c] pressed:
      ║  URL           https://github.com/franci/obsidian-utils       ║
      ║                                                               ║
      ║  ✓ URL copied to clipboard                                    ║
    shared_artifacts:
      - name: commit_url
        source: "detail panel state (from inspect step)"
        displayed_as: "clipboard contents after copy"
        consumers: ["clipboard (external)", "browser (external, future)"]
    emotional_state:
      entry: "Action-ready — I know which URL I want"
      exit: "Complete — URL in clipboard, ready to use"
    integration_checkpoint: |
      c copies commit_url to system clipboard. Confirmation message shown in panel.
      o opens URL in default browser (deferred to Tier 3 — may be unavailable in slice 1-3).
      If clipboard is unavailable (non-TTY, headless), show URL as selectable text.
    failure_modes:
      - "Clipboard not available in SSH/headless context — must not crash; show URL as text instead"
      - "Browser open fails silently — franci has no feedback"
    success_criteria: >
      c copies URL and shows one-line confirmation. Clipboard content matches displayed URL exactly.

    gherkin: |
      Scenario: URL is copied to clipboard from detail panel
        Given the detail panel is open for a commit with URL "https://github.com/franci/obsidian-utils"
        When franci presses c
        Then the URL is in the system clipboard
        And the panel shows "URL copied to clipboard"

      Scenario: Clipboard unavailable falls back to text display
        Given rusty-commit-lister is running in an SSH session without clipboard access
        When franci presses c
        Then the URL is displayed as selectable text in the panel
        And no error crash occurs
  - id: exit
    name: "Exit tool"
    action: "Press q or Esc from the main table"
    tui_mockup: |
      (TUI closes cleanly; terminal prompt returns)
      $
    emotional_state:
      entry: "Done — oriented, or found what I needed"
      exit: "Grounded — back in terminal, flow unbroken"
    integration_checkpoint: |
      q or Esc at main table level terminates the process. Terminal restored (raw mode disabled,
      cursor visible, no leftover ANSI sequences). Exit code 0. No orphan background threads.
    failure_modes:
      - "Alt screen not restored — terminal displays garbage after exit"
      - "Ctrl+C during load leaves terminal in raw mode — must handle SIGINT with cleanup"
    success_criteria: >
      Terminal returns to clean shell prompt. No visual artefacts. Exit code 0.

    gherkin: |
      Scenario: Clean exit restores terminal state
        Given the TUI is displaying the commit table
        When franci presses q
        Then the TUI closes
        And the terminal prompt appears on a clean line
        And no ANSI escape sequences remain visible

      Scenario: Ctrl+C during loading restores terminal
        Given rusty-commit-lister is scanning notes (loading state)
        When franci presses Ctrl+C
        Then the TUI is torn down cleanly
        And the terminal cursor and colours are restored
        And exit code is 130 (SIGINT convention)
integration_validation:
  shared_artifact_consistency:
    - artifact: scan_days_back
      must_match_across: [launch, load, status_bar]
      failure_message: "Status bar shows different window than was actually scanned"
    - artifact: commit_rows
      must_match_across: [load, browse, filter-or-search, inspect]
      failure_message: "Row count in status bar does not match rows visible in table"
    - artifact: commit_url
      must_match_across: [inspect, act]
      failure_message: "URL displayed in detail panel differs from URL copied to clipboard"
    - artifact: vault_path
      must_match_across: [load, error_messages]
      failure_message: "Error message references different vault path than config value"
acceptance_signals:
  - "Franci stops reaching for grep after first week of use"
  - "Tool used at least once daily (habitual, not occasional)"
  - "Search invoked without consulting help/README"
  - "Startup time imperceptible for scan_days_back <= 14"
constraints:
  - id: data-contract
    description: >
      Markdown table format owned by rusty-commit-saver. Expected columns: FOLDER | TIME | COMMIT MESSAGE | REPOSITORY URL. Parser treats this as stable contract.

    risk: high
    mitigation: "Document schema in parser module; integration test with real sample note"
  - id: unicode-path
    description: "Vault path contains emoji (📅 Diaries); must work across all Rust path operations"
    risk: medium
    mitigation: "Spike test with OsString before full parser implementation (slice-01)"
  - id: minimum-terminal-width
    description: "Table layout requires minimum 80 columns; below that columns collapse"
    risk: low
    mitigation: "Detect terminal width at startup; show warning if < 80 columns"
  - id: missing-cargo-deps
    description: "Cargo.toml missing ratatui, crossterm, chrono, walkdir, toml"
    risk: critical
    mitigation: "Add dependencies as first act of slice-01 (walking skeleton)"
out_of_scope:
  - Multiple Obsidian vault support (score 2 — YAGNI)
  - Export to Markdown/CSV (score 3 — data already in Obsidian)
  - Live file watcher (score 4 — manual r refresh is adequate)
changelog:
  - date: "2026-05-18"
    feature: rusty-commit-lister
    change: "Seed created by DISCOVER wave — steps, constraints, acceptance signals"
  - date: "2026-05-18"
    feature: rusty-commit-lister
    change: >
      DISCUSS wave: added emotional arc, TUI mockups per step, Gherkin embedded, shared artifact registry, integration validation, failure modes per step. Status promoted from seed to validated.

